version: '3.8'

services:
  webhook:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache git && git clone https://github.com/lucasqueirozr/webhook-chatwoot.git /app && cd /app && npm install && node server.js"
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - CHATWOOT_API_URL=https://ctw.hubdasgurias.com.br
      - CHATWOOT_BOT_TOKEN=rcyfmzDY1w6rgieWFjRZwJFT
    deploy:
      restart_policy:
        condition: any